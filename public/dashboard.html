<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landlord Dashboard — TenantReport</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🏠 TenantReport</div>
      <a href="index.html" class="btn btn-outline">+ New Work Order</a>
    </div>
  </header>

  <main class="container wide">
    <div class="dash-header">
      <h1>Landlord Dashboard</h1>
      <p>Manage and respond to tenant work orders</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-number" id="statPending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card in_progress">
        <div class="stat-number" id="statInProgress">—</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card resolved">
        <div class="stat-number" id="statResolved">—</div>
        <div class="stat-label">Resolved</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <label>Status</label>
      <select id="filterStatus">
        <option value="all">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>
      <label>Category</label>
      <select id="filterCategory">
        <option value="all">All Categories</option>
        <option value="plumbing">Plumbing</option>
        <option value="electrical">Electrical</option>
        <option value="heating_cooling">Heating / Cooling</option>
        <option value="structural">Structural</option>
        <option value="appliances">Appliances</option>
        <option value="pest">Pest</option>
        <option value="security">Security</option>
        <option value="other">Other</option>
      </select>
      <label>Sort</label>
      <select id="filterSort">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
      <button class="btn btn-primary" onclick="loadOrders()">Apply</button>
    </div>

    <!-- Order list -->
    <div class="order-list" id="orderList">
      <div class="empty"><div class="empty-icon">📋</div><p>Loading…</p></div>
    </div>
  </main>

  <!-- Detail modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 id="modalTitle"></h2>
      <img id="modalPhoto" class="modal-photo hidden" alt="Photo" />
      <div id="modalDetails"></div>
      <div class="modal-actions">
        <div style="display:flex;flex-direction:column;gap:.5rem;flex:1;">
          <label style="font-size:.85rem;font-weight:600">Update Status</label>
          <select id="modalStatus">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:.5rem;flex:1;">
          <label style="font-size:.85rem;font-weight:600">Priority</label>
          <select id="modalPriority">
            <option value="low">Low</option>
            <option value="normal">Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div style="margin-top:.75rem;">
        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:.35rem;">Internal Notes</label>
        <textarea id="modalNotes" rows="3" placeholder="Add notes for your records…"></textarea>
      </div>
      <button class="btn btn-primary" style="margin-top:1rem;width:100%" onclick="saveOrder()">Save Changes</button>
      <div id="modalMessage" class="message hidden" style="margin-top:.75rem;"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
