<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TenantReport</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">🏠 TenantReport</div>
    <nav>
      <a href="/landlord/dashboard.html" class="active">📊 Dashboard</a>
      <a href="/landlord/properties.html">🏢 Properties</a>
      <a href="/landlord/work-orders.html">📋 Work Orders</a>
      <a href="/landlord/tradesmen.html">🔨 Tradesmen</a>
    </nav>
    <div class="sidebar-footer">
      <div id="userName" style="color:#94a3b8;margin-bottom:.5rem;font-size:.85rem;"></div>
      <button onclick="logout()" class="btn btn-ghost btn-sm" style="color:#94a3b8;padding:0;">Sign out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <span id="notifBell" style="cursor:pointer;font-size:1.2rem;position:relative;" onclick="toggleNotifs()">
          🔔 <span id="notifCount" class="hidden" style="position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:999px;font-size:.65rem;padding:.1rem .35rem;"></span>
        </span>
        <a href="/landlord/work-orders.html" class="btn btn-primary btn-sm">View All Orders</a>
      </div>
    </div>

    <!-- Notifications dropdown -->
    <div id="notifPanel" class="hidden" style="position:absolute;right:1.5rem;top:70px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);width:340px;z-index:150;max-height:360px;overflow-y:auto;">
      <div style="padding:.75rem 1rem;font-weight:600;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;">
        Notifications <button onclick="markRead()" class="btn btn-ghost btn-sm" style="font-size:.75rem;">Mark all read</button>
      </div>
      <div id="notifList" style="padding:.5rem 0;"></div>
    </div>

    <div class="page-body">
      <!-- Stats -->
      <div class="grid-4" style="margin-bottom:1.5rem;">
        <div class="stat-card">
          <div class="stat-number" id="sTotal">—</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-number" id="sPending">—</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card stat-progress">
          <div class="stat-number" id="sProgress">—</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-number" id="sDone">—</div>
          <div class="stat-label">Closed</div>
        </div>
      </div>

      <!-- Recent work orders -->
      <div class="card">
        <div class="card-title">Recent Work Orders</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Unit</th><th>Tenant</th><th>Category</th><th>Status</th><th>Priority</th><th>Submitted</th><th></th></tr>
            </thead>
            <tbody id="recentOrders"><tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray-400);">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Work order detail modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <img id="modalPhoto" style="width:100%;max-height:240px;object-fit:cover;border-radius:8px;margin-bottom:1rem;" class="hidden" />
    <div id="modalBody"></div>
    <div style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
      <div class="field"><label>Status</label>
        <select id="mStatus">
          <option value="pending">Pending</option>
          <option value="accepted">Accepted</option>
          <option value="in_progress">In Progress</option>
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="field"><label>Priority</label>
        <select id="mPriority">
          <option value="low">Low</option>
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Assign Tradesman</label>
      <select id="mTradesman"><option value="">— Unassigned —</option></select>
    </div>
    <div class="field"><label>Internal Notes</label>
      <textarea id="mNotes" rows="3"></textarea>
    </div>
    <div id="modalMsg" class="message hidden"></div>
    <button class="btn btn-primary btn-full" onclick="saveModal()">Save Changes</button>
  </div>
</div>

<script>
  let currentId = null;
  let tradesmen = [];

  async function init() {
    const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
    if (!me || me.role !== 'landlord') { location.href = '/landlord/login.html'; return; }
    document.getElementById('userName').textContent = me.name;
    loadStats(); loadRecent(); loadNotifs(); loadTradesmen();
  }

  async function loadStats() {
    const s = await fetch('/api/landlord/stats').then(r => r.json());
    document.getElementById('sTotal').textContent = s.total;
    document.getElementById('sPending').textContent = s.pending;
    document.getElementById('sProgress').textContent = s.inProgress;
    document.getElementById('sDone').textContent = s.closed;
  }

  async function loadRecent() {
    const orders = await fetch('/api/landlord/work-orders?sort=newest').then(r => r.json());
    const tbody = document.getElementById('recentOrders');
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray-400);">No work orders yet.</td></tr>'; return; }
    tbody.innerHTML = orders.slice(0,10).map(o => `
      <tr>
        <td>${o.property_name || ''} · ${o.unit_number || ''}</td>
        <td>${esc(o.tenant_name)}</td>
        <td style="text-transform:capitalize;">${o.category.replace(/_/g,' ')}</td>
        <td><span class="badge badge-${o.status}">${o.status.replace('_',' ')}</span></td>
        <td><span class="badge badge-${o.priority}">${o.priority}</span></td>
        <td>${new Date(o.created_at).toLocaleDateString()}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openModal(${o.id})">Manage</button></td>
      </tr>`).join('');
  }

  async function loadTradesmen() {
    tradesmen = await fetch('/api/landlord/tradesmen').then(r => r.json());
    const sel = document.getElementById('mTradesman');
    sel.innerHTML = '<option value="">— Unassigned —</option>';
    tradesmen.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = `${t.name} (${t.trade})`; sel.appendChild(o); });
  }

  async function loadNotifs() {
    const notifs = await fetch('/api/landlord/notifications').then(r => r.json());
    const unread = notifs.filter(n => !n.read).length;
    const count = document.getElementById('notifCount');
    if (unread) { count.textContent = unread; count.classList.remove('hidden'); } else { count.classList.add('hidden'); }
    const list = document.getElementById('notifList');
    list.innerHTML = notifs.length ? notifs.map(n => `
      <div style="padding:.65rem 1rem;border-bottom:1px solid var(--gray-100);${!n.read?'background:#eff6ff;':''}font-size:.875rem;">
        ${esc(n.message)}<div style="font-size:.75rem;color:var(--gray-400);margin-top:.2rem;">${new Date(n.created_at).toLocaleString()}</div>
      </div>`).join('') : '<div style="padding:1rem;text-align:center;color:var(--gray-400);font-size:.875rem;">No notifications</div>';
  }

  async function markRead() {
    await fetch('/api/landlord/notifications/read', { method:'POST' });
    loadNotifs();
  }

  function toggleNotifs() {
    document.getElementById('notifPanel').classList.toggle('hidden');
  }

  async function openModal(id) {
    currentId = id;
    const o = await fetch(`/api/landlord/work-orders/${id}`).then(r => r.json());
    document.getElementById('modalTitle').textContent = `Work Order #${o.id} — Unit ${o.unit_number}`;
    const photo = document.getElementById('modalPhoto');
    if (o.photo_path) { photo.src = `/uploads/${o.photo_path}`; photo.classList.remove('hidden'); } else photo.classList.add('hidden');
    document.getElementById('modalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem;font-size:.875rem;">
        <div><span style="color:var(--gray-600);">Tenant</span><br><strong>${esc(o.tenant_name)}</strong></div>
        <div><span style="color:var(--gray-600);">Email</span><br>${esc(o.tenant_email)}</div>
        <div><span style="color:var(--gray-600);">Property</span><br>${esc(o.property_name||'')}</div>
        <div><span style="color:var(--gray-600);">Unit</span><br>${esc(o.unit_number||'')}</div>
        ${o.scheduled_date ? `<div><span style="color:var(--gray-600);">Scheduled</span><br>${o.scheduled_date} · ${o.scheduled_time}</div>` : ''}
        ${o.rating ? `<div><span style="color:var(--gray-600);">Rating</span><br>${'★'.repeat(o.rating)}${'☆'.repeat(5-o.rating)}</div>` : ''}
      </div>
      <div style="background:var(--gray-50);border-radius:6px;padding:.75rem;font-size:.875rem;margin-bottom:.75rem;">${esc(o.description)}</div>`;
    document.getElementById('mStatus').value = o.status;
    document.getElementById('mPriority').value = o.priority;
    document.getElementById('mNotes').value = o.notes || '';
    document.getElementById('mTradesman').value = o.assigned_to || '';
    document.getElementById('modalMsg').className = 'message hidden';
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

  async function saveModal() {
    const body = { status: document.getElementById('mStatus').value, priority: document.getElementById('mPriority').value, notes: document.getElementById('mNotes').value, assigned_to: document.getElementById('mTradesman').value || null };
    const res = await fetch(`/api/landlord/work-orders/${currentId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const msg = document.getElementById('modalMsg');
    if (res.ok) { msg.textContent = 'Saved!'; msg.className = 'message success'; loadStats(); loadRecent(); }
    else { msg.textContent = 'Failed to save.'; msg.className = 'message error'; }
  }

  async function logout() { await fetch('/api/auth/logout', { method:'POST' }); location.href = '/landlord/login.html'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.addEventListener('click', e => { if (!e.target.closest('#notifBell') && !e.target.closest('#notifPanel')) document.getElementById('notifPanel').classList.add('hidden'); });
  init();
</script>
</body>
</html>
