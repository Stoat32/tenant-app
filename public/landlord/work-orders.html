<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Orders — TenantReport</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🏠 TenantReport</div>
    <nav>
      <a href="/landlord/dashboard.html">📊 Dashboard</a>
      <a href="/landlord/properties.html">🏢 Properties</a>
      <a href="/landlord/work-orders.html" class="active">📋 Work Orders</a>
      <a href="/landlord/tradesmen.html">🔨 Tradesmen</a>
    </nav>
    <div class="sidebar-footer">
      <div id="userName" style="color:#94a3b8;margin-bottom:.5rem;font-size:.85rem;"></div>
      <button onclick="logout()" class="btn btn-ghost btn-sm" style="color:#94a3b8;padding:0;">Sign out</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="page-header">
      <h1>Work Orders</h1>
    </div>
    <div class="page-body">
      <!-- Filters -->
      <div class="card" style="margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;">
        <select id="fStatus" onchange="load()">
          <option value="all">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="accepted">Accepted</option>
          <option value="in_progress">In Progress</option>
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="closed">Closed</option>
        </select>
        <select id="fCategory" onchange="load()">
          <option value="all">All Categories</option>
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="heating_cooling">Heating/Cooling</option>
          <option value="structural">Structural</option>
          <option value="appliances">Appliances</option>
          <option value="pest">Pest</option>
          <option value="security">Security</option>
          <option value="other">Other</option>
        </select>
        <select id="fSort" onchange="load()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Property · Unit</th><th>Tenant</th><th>Category</th><th>Status</th><th>Priority</th><th>Tradesman</th><th>Submitted</th><th></th></tr>
            </thead>
            <tbody id="orderBody"><tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--gray-400);">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <img id="modalPhoto" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin-bottom:1rem;" class="hidden" />
    <div id="modalBody"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem;">
      <div class="field"><label>Status</label>
        <select id="mStatus">
          <option value="pending">Pending</option>
          <option value="accepted">Accepted</option>
          <option value="in_progress">In Progress</option>
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="field"><label>Priority</label>
        <select id="mPriority">
          <option value="low">Low</option>
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Assign Tradesman</label>
      <select id="mTradesman"><option value="">— Unassigned —</option></select>
    </div>
    <div class="field"><label>Internal Notes</label>
      <textarea id="mNotes" rows="3"></textarea>
    </div>
    <div id="modalMsg" class="message hidden"></div>
    <button class="btn btn-primary btn-full" onclick="saveModal()">Save Changes</button>
  </div>
</div>

<script>
  let currentId = null;
  let tradesmen = [];

  async function init() {
    const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
    if (!me || me.role !== 'landlord') { location.href = '/landlord/login.html'; return; }
    document.getElementById('userName').textContent = me.name;
    tradesmen = await fetch('/api/landlord/tradesmen').then(r => r.json());
    const sel = document.getElementById('mTradesman');
    tradesmen.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = `${t.name} (${t.trade})`; sel.appendChild(o); });
    load();
  }

  async function load() {
    const status = document.getElementById('fStatus').value;
    const category = document.getElementById('fCategory').value;
    const sort = document.getElementById('fSort').value;
    const orders = await fetch(`/api/landlord/work-orders?status=${status}&category=${category}&sort=${sort}`).then(r => r.json());
    const tbody = document.getElementById('orderBody');
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--gray-400);">No work orders found.</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => `<tr>
      <td style="color:var(--gray-400);">#${o.id}</td>
      <td>${esc(o.property_name||'')} · <strong>${esc(o.unit_number||'')}</strong></td>
      <td>${esc(o.tenant_name)}</td>
      <td style="text-transform:capitalize;">${o.category.replace(/_/g,' ')}</td>
      <td><span class="badge badge-${o.status}">${o.status.replace('_',' ')}</span></td>
      <td><span class="badge badge-${o.priority}">${o.priority}</span></td>
      <td>${esc(o.tradesman_name||'—')}</td>
      <td>${new Date(o.created_at).toLocaleDateString()}</td>
      <td><button class="btn btn-outline btn-sm" onclick="openModal(${o.id})">Manage</button></td>
    </tr>`).join('');
  }

  async function openModal(id) {
    currentId = id;
    const o = await fetch(`/api/landlord/work-orders/${id}`).then(r => r.json());
    document.getElementById('modalTitle').textContent = `Work Order #${o.id}`;
    const photo = document.getElementById('modalPhoto');
    if (o.photo_path) { photo.src = `/uploads/${o.photo_path}`; photo.classList.remove('hidden'); } else photo.classList.add('hidden');
    document.getElementById('modalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem;font-size:.875rem;">
        <div><span style="color:var(--gray-600);">Tenant</span><br><strong>${esc(o.tenant_name)}</strong></div>
        <div><span style="color:var(--gray-600);">Contact</span><br>${esc(o.tenant_email)}</div>
        <div><span style="color:var(--gray-600);">Property</span><br>${esc(o.property_name||'')}</div>
        <div><span style="color:var(--gray-600);">Unit</span><br>${esc(o.unit_number||'')}</div>
        ${o.scheduled_date?`<div><span style="color:var(--gray-600);">Scheduled</span><br>${o.scheduled_date} · ${o.scheduled_time}</div>`:''}
        ${o.rating?`<div><span style="color:var(--gray-600);">Rating</span><br>${'★'.repeat(o.rating)}${'☆'.repeat(5-o.rating)}</div>`:''}
      </div>
      <div style="background:var(--gray-50);border-radius:6px;padding:.75rem;font-size:.875rem;margin-bottom:.5rem;">${esc(o.description)}</div>
      <div style="margin-bottom:.5rem;">
        <a href="/track/${o.track_token}" target="_blank" style="color:var(--primary);font-size:.8rem;">🔗 Tenant tracking link</a>
      </div>`;
    document.getElementById('mStatus').value = o.status;
    document.getElementById('mPriority').value = o.priority;
    document.getElementById('mNotes').value = o.notes || '';
    document.getElementById('mTradesman').value = o.assigned_to || '';
    document.getElementById('modalMsg').className = 'message hidden';
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

  async function saveModal() {
    const body = { status: document.getElementById('mStatus').value, priority: document.getElementById('mPriority').value, notes: document.getElementById('mNotes').value, assigned_to: document.getElementById('mTradesman').value || null };
    const res = await fetch(`/api/landlord/work-orders/${currentId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const msg = document.getElementById('modalMsg');
    if (res.ok) { msg.textContent = 'Saved!'; msg.className = 'message success'; load(); }
    else { msg.textContent = 'Failed to save.'; msg.className = 'message error'; }
  }

  async function logout() { await fetch('/api/auth/logout', { method:'POST' }); location.href = '/landlord/login.html'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  init();
</script>
</body>
</html>
