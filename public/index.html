<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report a Defect — Tenant Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🏠 TenantReport</div>
      <a href="dashboard.html" class="btn btn-outline">Landlord Dashboard →</a>
    </div>
  </header>

  <main class="container">
    <div class="card form-card">
      <h1>Submit a Work Order</h1>
      <p class="subtitle">Report a defect or complaint. Your landlord will be notified immediately.</p>

      <form id="workOrderForm" enctype="multipart/form-data">

        <fieldset>
          <legend>Your Details</legend>
          <div class="row">
            <div class="field">
              <label for="tenant_name">Full Name <span class="req">*</span></label>
              <input type="text" id="tenant_name" name="tenant_name" placeholder="Jane Smith" required />
            </div>
            <div class="field">
              <label for="unit_number">Unit Number <span class="req">*</span></label>
              <input type="text" id="unit_number" name="unit_number" placeholder="e.g. 4B" required />
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="email">Email <span class="req">*</span></label>
              <input type="email" id="email" name="email" placeholder="jane@email.com" required />
            </div>
            <div class="field">
              <label for="phone">Phone (optional)</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" />
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Issue Details</legend>
          <div class="field">
            <label for="category">Category <span class="req">*</span></label>
            <select id="category" name="category" required>
              <option value="">— Select a category —</option>
              <option value="plumbing">🔧 Plumbing</option>
              <option value="electrical">⚡ Electrical</option>
              <option value="heating_cooling">🌡️ Heating / Cooling</option>
              <option value="structural">🧱 Structural / Walls / Ceiling</option>
              <option value="appliances">🍳 Appliances</option>
              <option value="pest">🐛 Pest / Infestation</option>
              <option value="security">🔒 Locks / Security</option>
              <option value="other">📋 Other</option>
            </select>
          </div>
          <div class="field">
            <label for="description">Description <span class="req">*</span></label>
            <textarea id="description" name="description" rows="4"
              placeholder="Describe the issue in detail — where it is, when it started, how severe it is..."
              required></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>Photo Evidence</legend>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="photo" name="photo" accept="image/*" capture="environment" />
            <div class="upload-placeholder" id="uploadPlaceholder">
              <span class="upload-icon">📷</span>
              <p>Tap to take a photo or choose from gallery</p>
              <p class="hint">JPG, PNG, HEIC — max 10MB</p>
            </div>
            <img id="photoPreview" class="photo-preview hidden" alt="Preview" />
          </div>
        </fieldset>

        <div id="formMessage" class="message hidden"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Submit Work Order
        </button>
      </form>
    </div>
  </main>

  <script src="tenant.js"></script>
</body>
</html>
